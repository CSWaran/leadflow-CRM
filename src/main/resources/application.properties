spring.application.name=crm-backend

# Enable debug logging for JWT authentication filter
logging.level.com.crm.security=DEBUG

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${JWT_SECRET:ChangeMeWithA256BitSecretKeyForJwtSigning}
security.jwt.expiration-minutes=60
security.jwt.issuer=crm-backend

app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@crm.local
app.bootstrap.admin.password=ChangeMe123!
app.bootstrap.admin.full-name=System Administrator
