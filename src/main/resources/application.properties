spring.application.name=crm-backend

# Enable debug logging for JWT authentication filter
logging.level.com.crm.security=DEBUG

spring.datasource.url=jdbc:mariadb://localhost:3306/crm?createDatabaseIfNotExist=true
spring.datasource.username=SpringBoot
spring.datasource.password=java
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=ChangeMeWithA256BitSecretKeyForJwtSigning
security.jwt.expiration-minutes=60
security.jwt.issuer=crm-backend

app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@crm.local
app.bootstrap.admin.password=ChangeMe123!
app.bootstrap.admin.full-name=System Administrator