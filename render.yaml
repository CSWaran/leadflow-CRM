services:
  - type: web
    name: leadflow-crm-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
        # Must be JDBC format: jdbc:postgresql://host/dbname?sslmode=require
        # Neon provides: postgresql://user:pass@host/db — DO NOT use that format directly.
        # Correct value example: jdbc:postgresql://ep-xxx.us-east-2.aws.neon.tech/crmdb?sslmode=require
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://leadflow-crm-frontend.onrender.com

  - type: web
    name: leadflow-crm-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: crm-frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://leadflow-crm-y06k.onrender.com/api/v1
